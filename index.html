<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>з”°еҫ‘жіЁйҹіе°„ж“Ҡ - Enter йҖҒеҮәзүҲ</title>
    <style>
        :root { --wood: #8b4513; --gold: #ffd700; }
        body { margin: 0; background: #121212; color: #fff; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 20px 60px; font-size: 32px; background: var(--wood); color: var(--gold); border: 3px solid var(--gold); border-radius: 10px; cursor: pointer; font-weight: bold; }

        #ui-layer { width: 95vw; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        #game-area { position: relative; width: 95vw; height: 70vh; background: #0d2b1d; border: 4px solid #444; overflow: hidden; border-radius: 8px; }
        
        .target { position: absolute; width: 150px; height: 80px; background: var(--wood); border: 2px solid #3d1f08; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; box-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .word { font-size: 28px; font-weight: bold; color: var(--gold); margin: 0; }
        .zhuyin { font-size: 15px; color: #eee; margin-top: 2px; }
        
        #input-box { font-size: 28px; padding: 12px; width: 450px; text-align: center; border: 3px solid var(--gold); background: #222; color: #fff; border-radius: 50px; outline: none; }
        #hint-text { color: #888; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:var(--gold); margin-bottom:30px;">рҹҸғвҖҚвҷӮпёҸ з”°еҫ‘жіЁйҹіе°„ж“ҠеӨ§иіҪ</h1>
        <p style="color:#ccc; margin-bottom:40px;">ијёе…Ҙе®Ңи«ӢжҢүгҖҢEnterгҖҚйҚөзҷје°„пјҒ</p>
        <button id="start-btn">й–Ӣе§ӢжҜ”иіҪ</button>
    </div>

    <div id="ui-layer">
        <div style="font-size:24px;">рҹҸ… еҲҶж•ё: <span id="score">0</span></div>
        <div>
            <input type="text" id="input-box" placeholder="йҒёеҘҪеӯ—еҫҢжҢү Enter" autocomplete="off" disabled>
            <div id="hint-text" style="text-align:center;">жҸҗзӨәпјҡжү“е®Ңеӯ—дёҖе®ҡиҰҒжҢү Enter е–”пјҒ</div>
        </div>
        <div style="font-size:24px;">вқӨпёҸ з”ҹе‘Ҫ: <span id="lives">5</span></div>
    </div>

    <div id="game-area"></div>

    <script>
        const wordBank = [
            // --- г„ў (еүҚйј»йҹі) зӣёй—ң ---
            {w: "еҪҺйҒ“", z: "г„Ёг„ў г„үг„ ЛӢ"}, {w: "йҚӣйҚҠ", z: "г„үг„Ёг„ўЛӢ г„Ңг„§г„ўЛӢ"}, {w: "и·Ёж¬„", z: "г„Һг„Ёг„ҡЛӢ г„Ңг„ўЛҠ"},
            {w: "е–®и…іи·і", z: "г„үг„ў г„җг„§г„ ЛҮ г„Ҡг„§г„ ЛӢ"}, {w: "жҢ‘жҲ°", z: "г„Ҡг„§г„ ЛҮ г„“г„ўЛӢ"}, {w: "й–ғйӣ»", z: "г„•г„ўЛҮ г„үг„§г„ўЛӢ"},
            {w: "ж№ӣи—Қ", z: "г„“г„ўЛӢ г„Ңг„ўЛҠ"}, {w: "ж¬„жһ¶", z: "г„Ңг„ўЛҠ г„җг„§г„ҡЛӢ"}, {w: "еүҚйҖІ", z: "г„‘г„§г„ўЛҠ г„җг„§г„ЈЛӢ"},
            {w: "еёҶеёғйһӢ", z: "г„Ҳг„ў г„…г„ЁЛӢ г„’г„§г„қЛҠ"}, {w: "з·©ж…ў", z: "г„Ҹг„Ёг„ўЛҮ г„Үг„ўЛӢ"}, {w: "еҘ®жҲ°", z: "г„Ҳг„ЈЛӢ г„“г„ўЛӢ"},
            {w: "з°Ўе–®", z: "г„җг„§г„ў г„үг„ў"}, {w: "е°–йҠі", z: "г„җг„§г„ў г„–г„Ёг„ҹЛӢ"}, {w: "д№ҫж·Ё", z: "г„Қг„ў г„җг„§г„ҘЛӢ"},
            {w: "зҮҰзҲӣ", z: "г„ҳг„ўЛӢ г„Ңг„ўЛӢ"}, {w: "ж¬„жқҶ", z: "г„Ңг„ўЛҠ г„Қг„ў"}, {w: "й—ңйҚө", z: "г„Қг„Ёг„ў г„җг„§г„ўЛӢ"},
            {w: "е–®зҙ”", z: "г„үг„ў г„”г„Ёг„ЈЛҠ"}, {w: "еӢҮж•ў", z: "г„©г„ҘЛҮ г„Қг„ўЛҮ"}, {w: "зңӢжқҝ", z: "г„Һг„ўЛӢ г„…г„ўЛҮ"},
            {w: "еҸҚеҪҲ", z: "г„Ҳг„ўЛҮ г„Ҡг„ўЛҠ"}, {w: "и«Үи©ұ", z: "г„Ҡг„ўЛҠ г„Ҹг„Ёг„ҡЛӢ"}, {w: "зңӢиҰӢ", z: "г„Һг„ўЛӢ г„җг„§г„ўЛӢ"},
            {w: "еҚҠе№ҙ", z: "г„…г„ўЛӢ г„Ӣг„§г„ўЛҠ"}, {w: "дјҙдҫ¶", z: "г„…г„ўЛӢ г„Ңг„©ЛҮ"}, {w: "ж·Ўе®ҡ", z: "г„үг„ўЛӢ г„үг„§г„ҘЛӢ"},
            {w: "з…©жғұ", z: "г„Ҳг„ўЛҠ г„Ӣг„ ЛҮ"}, {w: "зҮғзҮ’", z: "г„–г„ўЛҠ г„•г„ "}, {w: "ж„ҹжҹ“", z: "г„Қг„ўЛҮ г„–г„ўЛҮ"},
            {w: "иүұйӣЈ", z: "г„җг„§г„ў г„Ӣг„ўЛҠ"}, {w: "е®ЈеӮі", z: "г„’г„©г„ў г„”г„Ёг„ўЛҠ"}, {w: "жІҝеІё", z: "г„§г„ўЛҠ г„ўЛӢ"},

            // --- г„Ө (еҫҢйј»йҹі) зӣёй—ң ---
            {w: "иЎқеҲә", z: "г„”г„Ёг„Ҙ г„ҳЛӢ"}, {w: "еј·еЈҜ", z: "г„‘г„§г„ӨЛҠ г„“г„Ёг„ӨЛӢ"}, {w: "йіҙж§Қ", z: "г„Үг„§г„ҘЛҠ г„‘г„§г„Ө"},
            {w: "ж“Қе ҙ", z: "г„ҳг„  г„”г„ӨЛҮ"}, {w: "зҚҺзүҢ", z: "г„җг„§г„ӨЛҮ г„Ҷг„һЛҠ"}, {w: "еј·жӮҚ", z: "г„‘г„§г„ӨЛҠ г„Ҹг„ўЛӢ"},
            {w: "йҹҝдә®", z: "г„’г„§г„ӨЛҮ г„Ңг„§г„ӨЛӢ"}, {w: "еҜ¬е»Ј", z: "г„Һг„Ёг„ў г„Қг„Ёг„ӨЛҮ"}, {w: "ж”ҫй¬Ҷ", z: "г„Ҳг„ӨЛӢ г„ҷг„Ёг„Ҙ"},
            {w: "зӢӮж”ҫ", z: "г„Һг„Ёг„ӨЛҠ г„Ҳг„ӨЛӢ"}, {w: "жҷғеӢ•", z: "г„Ҹг„Ёг„ӨЛӢ г„үг„Ёг„ҘЛӢ"}, {w: "зӢҖжіҒ", z: "г„“г„Ёг„ӨЛӢ г„Һг„Ёг„ӨЛӢ"},
            {w: "еј·й …", z: "г„‘г„§г„ӨЛҠ г„’г„§г„ӨЛӢ"}, {w: "е…үиҠ’", z: "г„Қг„Ёг„Ө г„Үг„ӨЛҠ"}, {w: "еүӣеј·", z: "г„Қг„Ө г„‘г„§г„ӨЛҠ"},
            {w: "жҳӮиІҙ", z: "г„ӨЛҠ г„Қг„Ёг„ҹЛӢ"}, {w: "е№«еҝҷ", z: "г„…г„Ө г„Үг„ӨЛҠ"}, {w: "еӮҚжҷҡ", z: "г„…г„ӨЛӢ г„Ёг„ўЛҮ"},
            {w: "ж–№ж ј", z: "г„Ҳг„Ө г„Қг„ңЛҠ"}, {w: "и’јзҷҪ", z: "г„ҳг„Ө г„…г„һЛҠ"}, {w: "жөӘиҠұ", z: "г„Ңг„ӨЛӢ г„Ҹг„Ёг„ҡ"},
            {w: "й•·еәҰ", z: "г„”г„ӨЛҠ г„үг„ЁЛӢ"}, {w: "й•·и·‘", z: "г„”г„ӨЛҠ г„Ҷг„ ЛҮ"}, {w: "е»ЈеӨ§", z: "г„Қг„Ёг„ӨЛҮ г„үг„ҡЛӢ"},
            {w: "ж°§ж°Ј", z: "г„§г„ӨЛҮ г„‘г„§ЛӢ"}, {w: "йӨҠеҲҶ", z: "г„§г„ӨЛҮ г„Ҳг„ЈЛӢ"}, {w: "ж–№еҗ‘", z: "г„Ҳг„Ө г„’г„§г„ӨЛӢ"},
            {w: "зҚҺзӢҖ", z: "г„җг„§г„ӨЛҮ г„“г„Ёг„ӨЛӢ"}, {w: "еҒҘеә·", z: "г„җг„§г„ўЛӢ г„Һг„Ө"}, {w: "ж§ҚиҒІ", z: "г„‘г„§г„Ө г„•г„Ҙ"},

            // --- ж··еҗҲ г„ў иҲҮ г„Ө (й«ҳйӣЈеәҰиҫЁжһҗ) ---
            {w: "еј·зғҲ", z: "г„‘г„§г„ӨЛҠ г„Ңг„§г„қЛӢ"}, {w: "жӮҚе°Ү", z: "г„Ҹг„ўЛӢ г„җг„§г„ӨЛӢ"}, {w: "еүӣжҜ…", z: "г„Қг„Ө г„§ЛӢ"},
            {w: "жёҜеҸЈ", z: "г„Қг„ӨЛҮ г„Һг„ЎЛҮ"}, {w: "е•ҶйҮҸ", z: "г„•г„Ө г„Ңг„§г„ӨЛҠ"}, {w: "е–®ж§Қ", z: "г„үг„ў г„‘г„§г„Ө"},
            {w: "еёёиҰӢ", z: "г„”г„ӨЛҠ г„җг„§г„ўЛӢ"}, {w: "зӣёж’һ", z: "г„’г„§г„Ө г„“г„Ёг„ӨЛӢ"}, {w: "зў°ж’һ", z: "г„Ҷг„ҘЛӢ г„“г„Ёг„ӨЛӢ"},
            {w: "еј·иҝ«", z: "г„‘г„§г„ӨЛҮ г„Ҷг„ӣЛӢ"}, {w: "еҪҲи·і", z: "г„Ҡг„ўЛҠ г„Ҡг„§г„ ЛӢ"}, {w: "и®ҡиіһ", z: "г„—г„ўЛӢ г„•г„ӨЛҮ"},
            {w: "е ҙеӢҳ", z: "г„”г„ӨЛҮ г„Һг„ў"}, {w: "еЈҜи§Җ", z: "г„“г„Ёг„ӨЛӢ г„Қг„Ёг„ў"}, {w: "жөӘжј«", z: "г„Ңг„ӨЛӢ г„Үг„ўЛӢ"},

            // --- и·‘жӯҘиҲҮй«”иӮІе°ҲеҚҖ ---
            {w: "и·‘жӯҘ", z: "г„Ҷг„ ЛҮ г„…г„ЁЛӢ"}, {w: "з”°еҫ‘", z: "г„Ҡг„§г„ўЛҠ г„җг„§г„ҘЛӢ"}, {w: "жҒ©жәҗ", z: "г„Ј г„©г„ўЛҠ"}, 
            {w: "и·ҢеҖ’", z: "г„үг„§г„қЛҠ г„үг„ ЛҮ"}, {w: "йҰ¬жӢүжқҫ", z: "г„Үг„ҡЛҮ г„Ңг„ҡ г„ҷг„Ёг„Ҙ"}, {w: "жҺҘеҠӣиіҪ", z: "г„җг„§г„қ г„Ңг„§ЛӢ г„ҷг„һЛӢ"},
            {w: "ж·ұе‘јеҗё", z: "г„•г„Ј г„Ҹг„Ё г„’г„§"}, {w: "йҒӢеӢ•е“Ў", z: "г„©г„ЈЛӢ г„үг„Ёг„ҘЛӢ г„©г„ўЛҠ"}, {w: "зөӮй»һз·ҡ", z: "г„“г„Ёг„Ҙ г„үг„§г„ўЛҮ г„’г„§г„ўЛӢ"},
            {w: "жӢүзӯӢ", z: "г„Ңг„ҡ г„җг„§г„Ј"}, {w: "жұ—ж°ҙ", z: "г„Ҹг„ўЛӢ г„•г„Ёг„ҹЛҮ"}, {w: "еҠ йҖҹ", z: "г„җг„§г„ҡ г„ҷг„ЁЛӢ"},
            {w: "иө·и·‘з·ҡ", z: "г„‘г„§ЛҮ г„Ҷг„ ЛҮ г„’г„§г„ўЛӢ"}, {w: "зҲҶзҷјеҠӣ", z: "г„…г„ ЛӢ г„Ҳг„ҡ г„Ңг„§ЛӢ"}, {w: "ж•ҷз·ҙ", z: "г„җг„§г„ ЛӢ г„Ңг„§г„ўЛӢ"},
            {w: "й«”иӮІйӨЁ", z: "г„Ҡг„§ЛҮ г„©ЛӢ г„Қг„Ёг„ўЛҮ"}, {w: "зұғзҗғ", z: "г„Ңг„ўЛҠ г„‘г„§г„ЎЛҠ"}, {w: "жЈ’зҗғ", z: "г„…г„ӨЛӢ г„‘г„§г„ЎЛҠ"},
            {w: "жЎҢзҗғ", z: "г„“г„Ёг„ӣ г„‘г„§г„ЎЛҠ"}, {w: "з¶Ізҗғ", z: "г„Ёг„ӨЛҮ г„‘г„§г„ЎЛҠ"}, {w: "зҫҪжҜӣзҗғ", z: "г„©ЛҮ г„Үг„ ЛҠ г„‘г„§г„ЎЛҠ"},
            {w: "иӯ·иҶқ", z: "г„Ҹг„ЁЛӢ г„’г„§"}, {w: "иӯ·и…•", z: "г„Ҹг„ЁЛӢ г„Ёг„ўЛӢ"}, {w: "иЁҲжҷӮеҷЁ", z: "г„җг„§ЛӢ г„•ЛҠ г„‘г„§ЛӢ"}
        ];

        const gameArea = document.getElementById('game-area');
        const inputBox = document.getElementById('input-box');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        
        let score = 0;
        let lives = 5;
        let isPlaying = false;
        let speed = 0.3; // йҷҚиҗҪйҖҹеәҰ

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            inputBox.disabled = false;
            inputBox.focus();
            isPlaying = true;
            startGameLoop();
        });

        function startGameLoop() {
            setInterval(() => { if (isPlaying) spawnTarget(); }, 3500); 
        }

        function spawnTarget() {
            if (lives <= 0) return;
            const data = wordBank[Math.floor(Math.random() * wordBank.length)];
            const target = document.createElement('div');
            target.className = 'target';
            target.style.left = Math.random() * (gameArea.clientWidth - 160) + 'px';
            target.style.top = '-90px';
            target.innerHTML = `<div class="word">${data.w}</div><div class="zhuyin">${data.z}</div>`;
            target.dataset.word = data.w;
            gameArea.appendChild(target);

            let currentTop = -90;
            const fallInterval = setInterval(() => {
                if (!isPlaying) return;
                currentTop += speed;
                target.style.top = currentTop + 'px';
                if (currentTop > gameArea.clientHeight) {
                    clearInterval(fallInterval);
                    if (target.parentNode) { target.remove(); updateLives(-1); }
                }
            }, 16);
            target.dataset.intervalId = fallInterval;
        }

        // дҝ®ж”№зӮәжҢү Enter жүҚйҖҒеҮә
        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const typed = inputBox.value.trim();
                if (typed.length === 0) return;

                const targets = document.querySelectorAll('.target');
                let hit = false;
                
                targets.forEach(t => {
                    if (t.dataset.word === typed) {
                        clearInterval(t.dataset.intervalId);
                        t.remove();
                        score += 10;
                        document.getElementById('score').innerText = score;
                        hit = true;
                    }
                });

                // дёҚи«–жңүжІ’жңүжү“дёӯпјҢеҸӘиҰҒжҢүдәҶ Enter е°ұжё…з©әијёе…ҘжЎҶ
                inputBox.value = ''; 
            }
        });

        function updateLives(num) {
            lives += num;
            document.getElementById('lives').innerText = lives;
            if (lives <= 0) {
                isPlaying = false;
                alert("жҜ”иіҪзөҗжқҹпјҒжңҖзөӮеҫ—еҲҶпјҡ" + score);
                location.reload();
            }
        }
    </script>
</body>

</html>
