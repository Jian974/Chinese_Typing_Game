<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>田徑注音射擊 - 教學穩定版</title>
    <style>
        :root { --wood: #8b4513; --gold: #ffd700; }
        body { margin: 0; background: #121212; color: #fff; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 20px 60px; font-size: 32px; background: var(--wood); color: var(--gold); border: 3px solid var(--gold); border-radius: 10px; cursor: pointer; font-weight: bold; }

        #ui-layer { width: 95vw; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        #game-area { position: relative; width: 95vw; height: 70vh; background: #0d2b1d; border: 4px solid #444; overflow: hidden; border-radius: 8px; }
        
        .target { position: absolute; width: 150px; height: 80px; background: var(--wood); border: 2px solid #3d1f08; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; box-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .word { font-size: 28px; font-weight: bold; color: var(--gold); margin: 0; }
        .zhuyin { font-size: 15px; color: #eee; margin-top: 2px; }
        
        #input-box { font-size: 28px; padding: 12px; width: 450px; text-align: center; border: 3px solid var(--gold); background: #222; color: #fff; border-radius: 50px; outline: none; }
        #hint-text { color: #888; margin-top: 10px; font-size: 14px; }
        #loading-text { color: #aaa; font-size: 18px; margin-top: 10px; }
        #start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:var(--gold); margin-bottom:30px;">🏃‍♂️ 田徑注音射擊大賽</h1>
        <p style="color:#ccc; margin-bottom:40px;">選好字後，請按「Enter」鍵發射！</p>
        <p id="loading-text">⏳ 正在載入詞庫…</p>
        <button id="start-btn" disabled>開始比賽</button>
    </div>

    <div id="ui-layer">
        <div style="font-size:24px;">🏅 分數: <span id="score">0</span></div>
        <div>
            <input type="text" id="input-box" placeholder="選好字後按 Enter" autocomplete="off" disabled>
            <div id="hint-text" style="text-align:center;">提示：打完字一定要按 Enter 喔！</div>
        </div>
        <div style="font-size:24px;">❤️ 生命: <span id="lives">5</span></div>
    </div>

    <div id="game-area"></div>

    <script type="module">
        import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAnalytics }           from "https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics.js";
        import { getFirestore, collection, getDocs }
                                          from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        // ── Firebase 設定 ──────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey:            "AIzaSyCE9WOwK5sNsyz-PDfSXFE8BcpWxeyIGts",
            authDomain:        "chinese-typing-game.firebaseapp.com",
            projectId:         "chinese-typing-game",
            storageBucket:     "chinese-typing-game.firebasestorage.app",
            messagingSenderId: "827794855167",
            appId:             "1:827794855167:web:c2cf312a2c67df3844e8ca",
            measurementId:     "G-GLHCNEQ0X1"
        };

        const app       = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db        = getFirestore(app);

        // ── DOM refs ───────────────────────────────────────────────────────
        const gameArea  = document.getElementById('game-area');
        const inputBox  = document.getElementById('input-box');
        const startBtn  = document.getElementById('start-btn');
        const overlay   = document.getElementById('overlay');
        const loadingTxt= document.getElementById('loading-text');

        // ── Game state ─────────────────────────────────────────────────────
        let wordBank  = [];
        let score     = 0;
        let lives     = 5;
        let isPlaying = false;
        let speed     = 0.3;
        let lastWords = [];

        // ── Load word bank from Firestore ──────────────────────────────────
        async function loadWords() {
            try {
                const snapshot = await getDocs(collection(db, "words"));
                wordBank = snapshot.docs.map(doc => doc.data());

                if (wordBank.length === 0) {
                    loadingTxt.textContent = "⚠️ 詞庫是空的，請先執行上傳程式 upload_words.html";
                    return;
                }
                loadingTxt.style.display = 'none';
                startBtn.disabled = false;
            } catch (err) {
                loadingTxt.textContent = "❌ 載入失敗：" + err.message;
                console.error(err);
            }
        }
        loadWords();

        // ── Game logic ─────────────────────────────────────────────────────
        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            inputBox.disabled = false;
            inputBox.focus();
            isPlaying = true;
            startGameLoop();
        });

        function startGameLoop() {
            setInterval(() => { if (isPlaying) spawnTarget(); }, 3500);
        }

        function spawnTarget() {
            if (lives <= 0) return;

            let available = wordBank.filter(w => !lastWords.includes(w.w));
            if (available.length === 0) available = wordBank;
            const data = available[Math.floor(Math.random() * available.length)];

            lastWords.push(data.w);
            if (lastWords.length > 8) lastWords.shift();

            const target = document.createElement('div');
            target.className = 'target';
            target.style.left = Math.random() * (gameArea.clientWidth - 160) + 'px';
            target.style.top  = '-90px';
            target.innerHTML  = `<div class="word">${data.w}</div><div class="zhuyin">${data.z}</div>`;
            target.dataset.word = data.w;
            gameArea.appendChild(target);

            let currentTop = -90;
            const fallInterval = setInterval(() => {
                if (!isPlaying) return;
                currentTop += speed;
                target.style.top = currentTop + 'px';
                if (currentTop > gameArea.clientHeight) {
                    clearInterval(fallInterval);
                    if (target.parentNode) {
                        target.remove();
                        updateLives(-1);
                    }
                }
            }, 16);
            target.dataset.intervalId = fallInterval;
        }

        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const typed = inputBox.value.trim();
                if (typed.length === 0) return;

                document.querySelectorAll('.target').forEach(t => {
                    if (t.dataset.word === typed) {
                        clearInterval(t.dataset.intervalId);
                        t.remove();
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                });
                inputBox.value = '';
            }
        });

        function updateLives(num) {
            lives += num;
            document.getElementById('lives').innerText = lives;
            if (lives <= 0) {
                isPlaying = false;
                alert("比賽結束！最終得分：" + score);
                location.reload();
            }
        }
    </script>
</body>
</html>
