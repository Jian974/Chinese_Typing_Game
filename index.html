<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>田徑注音射擊 - 教學穩定版</title>
    <style>
        :root { --wood: #8b4513; --gold: #ffd700; }
        body { margin: 0; background: #121212; color: #fff; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 20px 60px; font-size: 32px; background: var(--wood); color: var(--gold); border: 3px solid var(--gold); border-radius: 10px; cursor: pointer; font-weight: bold; }

        #ui-layer { width: 95vw; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        #game-area { position: relative; width: 95vw; height: 70vh; background: #0d2b1d; border: 4px solid #444; overflow: hidden; border-radius: 8px; }
        
        .target { position: absolute; width: 150px; height: 80px; background: var(--wood); border: 2px solid #3d1f08; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; box-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .word { font-size: 28px; font-weight: bold; color: var(--gold); margin: 0; }
        .zhuyin { font-size: 15px; color: #eee; margin-top: 2px; }
        
        #input-box { font-size: 28px; padding: 12px; width: 450px; text-align: center; border: 3px solid var(--gold); background: #222; color: #fff; border-radius: 50px; outline: none; }
        #hint-text { color: #888; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:var(--gold); margin-bottom:30px;">🏃‍♂️ 田徑注音射擊大賽</h1>
        <p style="color:#ccc; margin-bottom:40px;">選好字後，請按「Enter」鍵發射！</p>
        <button id="start-btn">開始比賽</button>
    </div>

    <div id="ui-layer">
        <div style="font-size:24px;">🏅 分數: <span id="score">0</span></div>
        <div>
            <input type="text" id="input-box" placeholder="選好字後按 Enter" autocomplete="off" disabled>
            <div id="hint-text" style="text-align:center;">提示：打完字一定要按 Enter 喔！</div>
        </div>
        <div style="font-size:24px;">❤️ 生命: <span id="lives">5</span></div>
    </div>

    <div id="game-area"></div>

    <script>
        const wordBank = [
            // --- ㄢ (前鼻音) 核心練習 ---
            {w: "彎道", z: "ㄨㄢ ㄉㄠˋ"}, {w: "鍛鍊", z: "ㄉㄨㄢˋ ㄌㄧㄢˋ"}, {w: "跨欄", z: "ㄎㄨㄚˋ ㄌㄢˊ"},
            {w: "挑戰", z: "ㄊㄧㄠˇ ㄓㄢˋ"}, {w: "閃電", z: "ㄕㄢˇ ㄉㄧㄢˋ"}, {w: "湛藍", z: "ㄓㄢˋ ㄌㄢˊ"},
            {w: "欄架", z: "ㄌㄢˊ ㄐㄧㄚˋ"}, {w: "前進", z: "ㄑㄧㄢˊ ㄐㄧㄣˋ"}, {w: "緩慢", z: "ㄏㄨㄢˇ ㄇㄢˋ"},
            {w: "奮戰", z: "ㄈㄣˋ ㄓㄢˋ"}, {w: "簡單", z: "ㄐㄧㄢ ㄉㄢ"}, {w: "乾淨", z: "ㄍㄢ ㄐㄧㄥˋ"},
            {w: "燦爛", z: "ㄘㄢˋ ㄌㄢˋ"}, {w: "關鍵", z: "ㄍㄨㄢ ㄐㄧㄢˋ"}, {w: "勇敢", z: "ㄩㄥˇ ㄍㄢˇ"},
            {w: "反彈", z: "ㄈㄢˇ ㄊㄢˊ"}, {w: "談話", z: "ㄊㄢˊ ㄏㄨㄚˋ"}, {w: "艱難", z: "ㄐㄧㄢ ㄋㄢˊ"},
            {w: "宣傳", z: "ㄒㄩㄢ ㄔㄨㄢˊ"}, {w: "沿岸", z: "ㄧㄢˊ ㄢˋ"}, {w: "判斷", z: "ㄆㄢˋ ㄉㄨㄢˋ"},
            {w: "眼神", z: "ㄧㄢˇ ㄕㄣˊ"}, {w: "燦然", z: "ㄘㄢˋ ㄖㄢˊ"}, {w: "欄杆", z: "ㄌㄢˊ ㄍㄢ"},
            {w: "汗水", z: "ㄏㄢˋ ㄕㄨㄟˇ"}, {w: "健身", z: "ㄐㄧㄢˋ ㄕㄣ"}, {w: "簡約", z: "ㄐㄧㄢ ㄩㄝ"},
            {w: "盤旋", z: "ㄆㄢˊ ㄒㄩㄢˊ"}, {w: "信念", z: "ㄒㄧㄣˋ ㄋㄧㄢˋ"}, {w: "平凡", z: "ㄆㄧㄥˊ ㄈㄢˊ"},
    
            // --- ㄤ (後鼻音) 核心練習 ---
            {w: "衝刺", z: "ㄔㄨㄥ ㄘˋ"}, {w: "強壯", z: "ㄑㄧㄤˊ ㄓㄨㄤˋ"}, {w: "鳴槍", z: "ㄇㄧㄥˊ ㄑㄧㄤ"},
            {w: "操場", z: "ㄘㄠ ㄔㄤˇ"}, {w: "獎牌", z: "ㄐㄧㄤˇ ㄆㄞˊ"}, {w: "強悍", z: "ㄑㄧㄤˊ ㄏㄢˋ"},
            {w: "響亮", z: "ㄒㄧㄤˇ ㄌㄧㄤˋ"}, {w: "寬廣", z: "ㄎㄨㄢ ㄍㄨㄤˇ"}, {w: "放鬆", z: "ㄈㄤˋ ㄙㄨㄥ"},
            {w: "狂放", z: "ㄎㄨㄤˊ ㄈㄤˋ"}, {w: "晃動", z: "ㄏㄨㄤˋ ㄉㄨㄥˋ"}, {w: "狀況", z: "ㄓㄨㄤˋ ㄎㄨㄤˋ"},
            {w: "強項", z: "ㄑㄧㄤˊ ㄒㄧㄤˋ"}, {w: "光芒", z: "ㄍㄨㄤ ㄇㄤˊ"}, {w: "剛強", z: "ㄍㄤ ㄑㄧㄤˊ"},
            {w: "幫忙", z: "ㄅㄤ ㄇㄤˊ"}, {w: "傍晚", z: "ㄅㄤˋ ㄨㄢˇ"}, {w: "蒼白", z: "ㄘㄤ ㄅㄞˊ"},
            {w: "長度", z: "ㄔㄤˊ ㄉㄨˋ"}, {w: "長跑", z: "ㄔㄤˊ ㄆㄠˇ"}, {w: "廣大", z: "ㄍㄨㄤˇ ㄉㄚˋ"},
            {w: "氧氣", z: "ㄧㄤˇ ㄑㄧˋ"}, {w: "方向", z: "ㄈㄤ ㄒㄧㄤˋ"}, {w: "獎狀", z: "ㄐㄧㄤˇ ㄓㄨㄤˋ"},
            {w: "健康", z: "ㄐㄧㄢˋ ㄎㄤ"}, {w: "槍聲", z: "ㄑㄧㄤ ㄕㄥ"}, {w: "浪潮", z: "ㄌㄤˋ ㄔㄠˊ"},
            {w: "昂揚", z: "ㄤˊ ㄧㄤˊ"}, {w: "鋼鐵", z: "ㄍㄤ ㄊㄧㄝˇ"}, {w: "港灣", z: "ㄍㄤˇ ㄨㄢ"},

            // --- 運動專區 ---
            {w: "跑步", z: "ㄆㄠˇ ㄅㄨˋ"}, {w: "田徑", z: "ㄊㄧㄢˊ ㄐㄧㄥˋ"}, {w: "跌倒", z: "ㄉㄧㄝˊ ㄉㄠˇ"}, 
            {w: "馬拉松", z: "ㄇㄚˇ ㄌㄚ ㄙㄨㄥ"}, {w: "接力賽", z: "ㄐㄧㄝ ㄌㄧˋ ㄙㄞˋ"}, {w: "深呼吸", z: "ㄕㄣ ㄏㄨ ㄒㄧ"}, 
            {w: "運動員", z: "ㄩㄣˋ ㄉㄨㄥˋ ㄩㄢˊ"}, {w: "終點線", z: "ㄓㄨㄥ ㄉㄧㄢˇ ㄒㄧㄢˋ"}, {w: "拉筋", z: "ㄌㄚ ㄐㄧㄣ"}, 
            {w: "加速", z: "ㄐㄧㄚ ㄙㄨˋ"}, {w: "起跑線", z: "ㄑㄧˇ ㄆㄠˇ ㄒㄧㄢˋ"}, {w: "爆發力", z: "ㄅㄠˋ ㄈㄚ ㄌㄧˋ"}, 
            {w: "教練", z: "ㄐㄧㄠˋ ㄌㄧㄢˋ"}, {w: "籃球", z: "ㄌㄢˊ ㄑㄧㄡˊ"}, {w: "網球", z: "ㄨㄤˇ ㄑㄧㄡˊ"},
            {w: "護膝", z: "ㄏㄨˋ ㄒㄧ"}, {w: "計時器", z: "ㄐㄧˋ ㄕˊ ㄑㄧˋ"}, {w: "耐力", z: "ㄋㄞˋ ㄌㄧˋ"},
            {w: "速度", z: "ㄙㄨˋ ㄉㄨˋ"}, {w: "熱身", z: "ㄖㄜˋ ㄕㄣ"}, {w: "跳高", z: "ㄊㄧㄠˋ ㄍㄠ"},
            {w: "跳遠", z: "ㄊㄧㄠˋ ㄩㄢˇ"}, {w: "鉛球", z: "ㄑㄧㄢ ㄑㄧㄡˊ"}, {w: "三級跳", z: "ㄙㄢ ㄐㄧˊ ㄊㄧㄠˋ"},
        
            // --- 辨析練習 ---
            {w: "慷慨", z: "ㄎㄤ ㄎㄞˇ"}, {w: "盤算", z: "ㄆㄢˊ ㄙㄨㄢˋ"},
            {w: "安詳", z: "ㄢ ㄒㄧㄤˊ"}, {w: "昂貴", z: "ㄤˊ ㄍㄨㄟˋ"}, {w: "擔當", z: "ㄉㄢ ㄉㄤ"},
            {w: "渲染", z: "ㄒㄩㄢˋ ㄖㄢˇ"}, {w: "廣播", z: "ㄍㄨㄤˇ ㄅㄛ"}, {w: "繁忙", z: "ㄈㄢˊ ㄇㄤˊ"},
            {w: "欣賞", z: "ㄒㄧㄣ ㄕㄤˇ"}, {w: "贊同", z: "ㄗㄢˋ ㄊㄨㄥˊ"}, {w: "榜樣", z: "ㄅㄤˇ ㄧㄤˋ"},
            {w: "徜徉", z: "ㄔㄤˊ ㄧㄤˊ"}, {w: "頑強", z: "ㄨㄢˊ ㄑㄧㄤˊ"}, {w: "斑斕", z: "ㄅㄢ ㄌㄢˊ"},
            {w: "綻放", z: "ㄓㄢˋ ㄈㄤˋ"}, {w: "浪漫", z: "ㄌㄤˋ ㄇㄢˋ"},
            {w: "清爽", z: "ㄑㄧㄥ ㄕㄨㄤˇ"}, {w: "觀看", z: "ㄍㄨㄢ ㄎㄢˋ"}, {w: "場勘", z: "ㄔㄤˇ ㄎㄢ"}
        ];

        const gameArea = document.getElementById('game-area');
        const inputBox = document.getElementById('input-box');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        
        let score = 0;
        let lives = 5;
        let isPlaying = false;
        let speed = 0.3; 
        let lastWords = []; // 用於防止連續重複

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            inputBox.disabled = false;
            inputBox.focus();
            isPlaying = true;
            startGameLoop();
        });

        function startGameLoop() {
            // 每 3.5 秒產生一個新目標
            setInterval(() => { if (isPlaying) spawnTarget(); }, 3500); 
        }

        function spawnTarget() {
            if (lives <= 0) return;

            // 隨機選取詞彙，並避開最近出現過的 8 個詞
            let availableWords = wordBank.filter(w => !lastWords.includes(w.w));
            const data = availableWords[Math.floor(Math.random() * availableWords.length)];
            
            lastWords.push(data.w);
            if (lastWords.length > 8) lastWords.shift();

            const target = document.createElement('div');
            target.className = 'target';
            target.style.left = Math.random() * (gameArea.clientWidth - 160) + 'px';
            target.style.top = '-90px';
            target.innerHTML = `<div class="word">${data.w}</div><div class="zhuyin">${data.z}</div>`;
            target.dataset.word = data.w;
            gameArea.appendChild(target);

            let currentTop = -90;
            const fallInterval = setInterval(() => {
                if (!isPlaying) return;
                currentTop += speed;
                target.style.top = currentTop + 'px';
                if (currentTop > gameArea.clientHeight) {
                    clearInterval(fallInterval);
                    if (target.parentNode) { 
                        target.remove(); 
                        updateLives(-1); 
                    }
                }
            }, 16);
            target.dataset.intervalId = fallInterval;
        }

        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const typed = inputBox.value.trim();
                if (typed.length === 0) return;

                const targets = document.querySelectorAll('.target');
                targets.forEach(t => {
                    if (t.dataset.word === typed) {
                        clearInterval(t.dataset.intervalId);
                        t.remove();
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                });
                inputBox.value = ''; 
            }
        });

        function updateLives(num) {
            lives += num;
            document.getElementById('lives').innerText = lives;
            if (lives <= 0) {
                isPlaying = false;
                alert("比賽結束！最終得分：" + score);
                location.reload();
            }
        }
    </script>
</body>
</html>
